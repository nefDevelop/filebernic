name: Build and Release MuxApp

on:
  push:
    tags:
      - "v*" # Se activa cuando subes un tag como v1.0.0, v1.1.0, etc.
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip lua5.1 luarocks
          sudo luarocks install busted

      - name: Run tests (busted)
        run: busted

      - name: Create .muxapp
        run: |
          chmod +x create_muxapp.sh
          ./create_muxapp.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: filebernic-muxapp
          path: filebernic.muxapp

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: filebernic.muxapp
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
