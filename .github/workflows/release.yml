name: Build and Release MuxApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para crear la Release y el Tag
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para ver los tags existentes

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip lua5.1 luarocks
          sudo luarocks install busted

      - name: Run tests (busted)
        run: busted

      - name: Extract version from main.lua
        id: get_version
        run: |
          VERSION=$(grep "APP_VERSION =" filebernic/main.lua | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Detectada versión: $VERSION"

      - name: Create .muxapp
        run: |
          chmod +x create_muxapp.sh
          ./create_muxapp.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: filebernic-muxapp
          path: filebernic.muxapp

      - name: Check if Release exists
        id: check_release
        run: |
          if git rev-parse "refs/tags/${{ steps.get_version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "La versión ${{ steps.get_version.outputs.VERSION }} ya existe. No se creará release."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Nueva versión detectada: ${{ steps.get_version.outputs.VERSION }}"
          fi

      - name: Create Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: filebernic.muxapp
          name: Release ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
