name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para crear Tags y Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para poder leer los tags anteriores

      - name: Install Lua & Busted
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install busted

      - name: Run Tests
        run: busted spec/

      - name: Check Version and Tag
        id: release_check
        run: |
          # Extraer la versión directamente de main.lua
          VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' filebernic/main.lua)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Condiciones para saltar la release
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "El tag $VERSION ya existe. Solo fue un push de código normal. Saltando release."
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.head_commit.message }}" == *"[skip release]"* ]]; then
            echo "Commit incluye [skip release]. Saltando release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Nueva versión detectada ($VERSION). Se procederá a publicar."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build .muxapp
        if: steps.release_check.outputs.skip == 'false'
        run: |
          cd filebernic
          zip -r ../filebernic.muxapp . -x "*.git*" -x ".DS_Store"
          cd ..

      - name: Create Release
        if: steps.release_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_check.outputs.version }}
          name: FileBernic ${{ steps.release_check.outputs.version }}
          files: filebernic.muxapp
          generate_release_notes: true
